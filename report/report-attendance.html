<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Attendance</title>

<link rel="stylesheet" href="report-attendance.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="report-toolbar">

  <div class="control-panel">

    <select id="companyFilter" onchange="applyFilterAndSort()">
      <option value="ALL">All Company</option>
    </select>

    <select id="attendanceFilter" onchange="applyFilterAndSort()">
      <option value="ALL">All Attendance</option>
      <option value="ATTEND">Attend</option>
      <option value="NOT_ATTEND">Not Attend</option>
    </select>

    <select id="sortField" onchange="applyFilterAndSort()">
      <option value="name">Sort By Name</option>
      <option value="company">Sort By Company</option>
      <option value="attendance">Sort By Attendance</option>
    </select>

    <select id="sortOrder" onchange="applyFilterAndSort()">
      <option value="az">A - Z</option>
      <option value="za">Z - A</option>
    </select>

  </div>

  <div class="button-panel">
    <button type="button" onclick="downloadExcel()">Excel</button>
    <button type="button" onclick="downloadPDF()">PDF</button>
    <button type="button" onclick="downloadWord()">Document</button>
    <button type="button" onclick="window.print()">Print</button>
  </div>

</div>

<div class="preview-wrapper">

  <div id="reportArea" class="a4-paper">

    <div class="letter-head">
      <h1>TROPICAL DINNER 2026</h1>
      <h2>REPORT ATTENDANCE</h2>
    </div>

    <table class="report-table">
      <thead>
        <tr>
          <th>No.</th>
          <th>Employee Name</th>
          <th>Company</th>
          <th>Attendance</th>
        </tr>
      </thead>

      <tbody id="attendanceBody">
        <tr>
          <td colspan="4">Loading...</td>
        </tr>
      </tbody>
    </table>

    <h3 class="summary-title">Attendance Summary</h3>

    <table class="summary-table">
      <thead>
        <tr>
          <th>Company</th>
          <th>Total Attend</th>
          <th>Total Not Attend</th>
        </tr>
      </thead>

      <tbody id="summaryBody"></tbody>

      <tfoot>
        <tr>
          <th>GRAND TOTAL</th>
          <th id="grandAttend">0</th>
          <th id="grandNotAttend">0</th>
        </tr>
      </tfoot>
    </table>

  </div>

</div>

<script src="../api.js"></script>
<script src="report-attendance.js"></script>

</body>
</html>
