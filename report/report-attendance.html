<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Attendance</title>

<link rel="stylesheet" href="report.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>

<div class="page">

  <div class="filter-area">
    <select id="companyFilter" onchange="applyFilter()">
      <option value="ALL">All Company</option>
    </select>

    <select id="attendanceFilter" onchange="applyFilter()">
      <option value="ALL">All Attendance</option>
      <option value="ATTEND">Attend</option>
      <option value="NOT_ATTEND">Not Attend</option>
    </select>
  </div>

  <div class="button-area">
    <button onclick="downloadExcel()">Download Excel</button>
    <button onclick="downloadPDF()">Download PDF</button>
    <button onclick="downloadWord()">Download Document</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div id="reportArea">

    <div class="letter-head">
      <h1>TROPICAL DINNER 2026</h1>
      <h2>REPORT ATTENDANCE</h2>
    </div>

    <table class="main-table" id="attendanceTable">
      <thead>
        <tr>
          <th>No.</th>
          <th>Employee Name</th>
          <th>Company</th>
          <th>Attendance</th>
        </tr>
      </thead>
      <tbody id="attendanceBody">
        <tr>
          <td colspan="4">Loading...</td>
        </tr>
      </tbody>
    </table>

    <h3 class="summary-title">Attendance Summary</h3>

    <table class="summary-table" id="summaryTable">
      <thead>
        <tr>
          <th>Company</th>
          <th>Total Attend</th>
          <th>Total Not Attend</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
      <tfoot>
        <tr>
          <th>GRAND TOTAL</th>
          <th id="grandAttend">0</th>
          <th id="grandNotAttend">0</th>
        </tr>
      </tfoot>
    </table>

  </div>

</div>

<script src="report-attendance.js"></script>
</body>
</html>
