<style>
/* =========================
   ATTENDANCE FILTER ALIGN FIX
   Company dropdown full name + search aligned
========================= */
.attend-filter-box{
  width:min(780px,92%);
  margin:0 auto 30px;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  gap:12px !important;
  flex-wrap:nowrap !important;
}

#companyFilter{
  width:380px !important;
  min-width:380px !important;
  height:49px !important;
  flex:0 0 380px !important;
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}

.attend-filter-box .input-container{
  flex:1 1 auto !important;
  min-width:0 !important;
}

.attend-filter-box .input-container input{
  width:100% !important;
}

@media(max-width:768px){
  .attend-filter-box{
    width:94% !important;
    flex-direction:column !important;
    align-items:stretch !important;
    gap:10px !important;
  }

  #companyFilter{
    width:100% !important;
    min-width:0 !important;
    flex:0 0 auto !important;
  }

  .attend-filter-box .input-container{
    width:100% !important;
  }
}
</style>

</head>

<body class="attend-page">

 <div id="menuContainer"></div>

<script>
fetch("menu.html")
.then(res => res.text())
.then(html => {
  document.getElementById("menuContainer").innerHTML = html;

  const oldScript = document.getElementById("menuScript");
  if(oldScript){
    oldScript.remove();
  }

  const script = document.createElement("script");
  script.src = "menu.js";
  script.id = "menuScript";
  document.body.appendChild(script);
});
</script>
  
<header class="hero-header">
  <h1>TROPICAL DINNER 2026</h1>
  <h2>Attendance System</h2>
</header>

<div class="container">

  <div class="input-box attend-filter-box">

    <select id="companyFilter" onchange="filterAttendData()">
      <option value="ALL">All Company</option>
    </select>

    <div class="input-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Search Lucky No / Employee / Company"
        oninput="filterAttendData()"
      >
      <button class="clear-btn" id="clearSearchBtn" onclick="clearSearch()">X</button>
    </div>

  </div>

  <div class="main-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Lucky Draw No.</th>
            <th>Employee Name</th>
            <th>Company Name</th>
          </tr>
        </thead>

        <tbody id="attendTableBody">
          <tr>
            <td colspan="3">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="attendPopup" class="popup-overlay">
  <div class="popup-box">

    <button class="popup-close" onclick="closePopup()">×</button>

    <h2>Attendance Detail</h2>

    <p><b>Lucky Draw No.:</b> <span id="popupLuckyNo"></span></p>
    <p><b>Employee Name:</b> <span id="popupEmployee"></span></p>
    <p><b>Company Name:</b> <span id="popupCompany"></span></p>

    <button id="attendBtn" class="attend-btn" onclick="markAttend()">Attend</button>

  </div>
</div>

<script src="api.js"></script>
  <script src="attend.js"></script>

</body>
</html>
