<!DOCTYPE html>
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Lucky Draw Input</title>

<meta property="og:title" content="Lucky Draw Input">
<meta property="og:description" content="Tropical Dinner 2026 Lucky Draw System">
<meta property="og:image" content="https://i.ibb.co/7dSQk3NL/Input-Lucky-No.jpg">
<meta property="og:url" content="https://menuutama.github.io/tropical-dinner/input.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Lucky Draw Input">
<meta name="twitter:description" content="Tropical Dinner 2026 Lucky Draw System">
<meta name="twitter:image" content="https://i.ibb.co/7dSQk3NL/Input-Lucky-No.jpg">

  
  <link rel="stylesheet" href="style2.css">
</head>

<body class="input-page">   

  <!-- ===== PAGE TITLE ===== -->
  <header class="hero-header">
    <h1>TROPICAL DINNER 2026</h1>
    <h2>Lucky Draw System</h2>
  </header> 
  
  <!-- ===== MAIN CONTAINER =====  -->
  <div class="container"> 
    
    <!-- INPUT AREA -->
    <div class="input-box"> 
      <div class="input-container">
        <input 
          type="text" 
          id="luckyNo" 
          inputmode="numeric" 
          pattern="[0-9]*" 
          placeholder="Enter Lucky No."
          autocomplete="off"
        > 

        <button 
          type="button" 
          id="clearInputBtn" 
          class="clear-btn"
        >
          X
        </button>
      </div>

      <button id="addBtn">Add</button> 
    </div> 
    
    <!-- TABLE AREA --> 
    <div class="main-content"> 
      <div class="table-wrapper">
        <table> 
          <thead>
            <tr> 
              <th>PLACE</th> 
              <th>LUCKY NO.</th>
              <th>WINNER</th>
              <th>COMPANY</th>
</tr> 
          </thead> 

          <tbody id="winnerTable">
            <!-- Diisi secara dinamik melalui JavaScript -->
          </tbody> 
        </table> 
        
        <!-- PAGINATION BUTTONS -->
        <div id="pagination" class="pagination-container"></div>
      </div>
    </div> 

  </div>

  <script src="api.js"></script>
  <script src="input.js"></script>

</body>
</html>
