<!DOCTYPE html>
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Lucky Draw System</title> 
  <link rel="stylesheet" href="style2.css">
</head>

<body>   

  <!-- ===== PAGE TITLE ===== -->
  <header class="hero-header">
    <h1>TROPICAL DINNER 2026</h1>
    <h2>Lucky Draw System</h2>
  </header> 
  
  <!-- ===== MAIN CONTAINER ===== -->
  <div class="container"> 
    
    <!-- INPUT AREA -->
    <div class="input-box"> 
      <div class="input-container">
        <input 
          type="text" 
          id="luckyNo" 
          inputmode="numeric" 
          pattern="[0-9]*" 
          placeholder="Enter Lucky No."
          autocomplete="off"
        > 

        <button 
          type="button" 
          id="clearInputBtn" 
          class="clear-btn"
        >
          X
        </button>
      </div>

      <button id="addBtn">Add</button> 
    </div> 
    
    <!-- TABLE AREA --> 
    <div class="main-content"> 
      <div class="table-wrapper">
        <table> 
          <thead>
            <tr> 
              <th>PLACE</th> 
              <th>LUCKY NO.</th>
              <th>WINNER</th>
              <th>COMPANY</th> 
              <th>PRIZE</th>
              <th>ACTION</th>
            </tr> 
          </thead> 

          <tbody id="winnerTable">
            <!-- Diisi secara dinamik melalui JavaScript -->
          </tbody> 
        </table> 
        
        <!-- PAGINATION BUTTONS -->
        <div id="pagination" class="pagination-container"></div>
      </div>
    </div> 

  </div>

  <script src="api.js"></script>
  <script src="input.js"></script>

</body>
</html>
