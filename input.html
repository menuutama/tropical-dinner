<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Draw System</title>
  <link rel="stylesheet" href="input.css">
</head>

<body>

<header class="hero-header">
  <h1>TROPICAL DINNER 2026</h1>
  <h2>Lucky Draw System</h2>
</header>

<div class="search-area">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search Lucky No / Winner / Company">
    <button class="search-clear-btn" id="clearBtn">×</button>
  </div>
</div>

<div class="container">

  <div class="input-box">
    <div class="input-container">
      <input
        type="text"
        id="luckyNo"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="Enter Lucky No."
        oninput="toggleClearBtn()"
        onkeypress="if(event.key === 'Enter') addItem()"
      >
      <button type="button" id="clearInputBtn" class="clear-btn" onclick="clearInput()">X</button>
    </div>

    <button id="addBtn" onclick="addItem()">Add</button>
  </div>

  <div class="main-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>PLACE</th>
            <th>LUCKY NO.</th>
            <th>WINNER</th>
            <th>COMPANY</th>
            <th>PRIZE</th>
            <th>ACTION</th>
          </tr>
        </thead>

        <tbody id="winnerTable"></tbody>
      </table>

      <div id="pagination" class="pagination-container"></div>
    </div>
  </div>

</div>

<script src="input.js"></script>
</body>
</html>
