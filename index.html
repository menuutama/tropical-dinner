<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tropical Dinner 2026 - Live Lucky Draw</title>

<!-- CSS FILE -->
<link rel="preconnect" href="https://googleapis.com">
<link href="https://googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">

    <div class="sub-title">
      TROPICAL DINNER 2026
    </div>

    <div class="title">
      LIVE LUCKY DRAW WINNERS
    </div>

    <!-- Ditambah class "live-update-badge" untuk rujukan JS meletakkan search bar -->
    <div class="live-box live-update-badge">
      <div class="dot"></div>
      LIVE UPDATING
    </div>

  </div>

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>PLACE</th>
          <th>LUCKY NO.</th>
          <th>WINNER</th>
          <th>COMPANY</th>
          <th>PRIZE</th>
        </tr>
      </thead>

      <tbody id="winnerTable"></tbody>

    </table>

  </div>

  <div class="footer">

    <div class="pagination" id="pagination"></div>

    <div class="control-buttons">
      <button onclick="playSlide()">▶ Play</button>
      <button onclick="pauseSlide()">⏸ Pause</button>
      <!-- Butang untuk cetus Mod Projektor / Skrin Penuh -->
      <button id="projectorBtn" class="projector-trigger-btn" onclick="openProjectorMode()">🖥️ Fullscreen</button>

    </div>

  </div>

  <div class="notice">
    Kindly collect your lucky draw prize at the registration counter before leaving the event.
  </div>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
