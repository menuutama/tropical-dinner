<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tropical Dinner 2026 - Live Lucky Draw</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS FILE -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">

    <div class="sub-title">
      TROPICAL DINNER 2026
    </div>

    <div class="title">
      LIVE LUCKY DRAW WINNERS
    </div>

    <div class="live-box">
      <div class="dot"></div>
      LIVE UPDATING
    </div>

  </div>

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>PLACE</th>
          <th>LUCKY NO.</th>
          <th>WINNER</th>
          <th>COMPANY</th>
          <th>PRIZE</th>
        </tr>
      </thead>

      <tbody id="winnerTable"></tbody>

    </table>

  </div>

  <div class="footer">

    <div class="pagination" id="pagination"></div>

    <div class="control-buttons">
      <button onclick="playSlide()">▶ Play</button>
      <button onclick="pauseSlide()">⏸ Pause</button>
      <button id="projectorBtn" onclick="openProjectorMode()">🖥️ Fullscreen</button>
    </div>

  </div>

  <div class="notice">
    Kindly collect your lucky draw prize at the registration counter before leaving the event.
  </div>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
