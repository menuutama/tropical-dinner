<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwyHlDqGumNenEhW6w5iAcA2984E1AbnXOfemzaxPOgk8pqXKD-pg6zw4Rw6U3sk-tY/exec";

let allData = [];
let currentPage = 1;
let lastDataString = ""; // Menyimpan cache data untuk elak render berulang
let autoSlide;
const ROWS_PER_PAGE = 10;

/* 1. MUAT TURUN DATA (Lebih Pintar & Tiada Buffering Grafik) */
async function loadData(){
  try{
    const response = await fetch(API_URL);
    const rawData = await response.json();

    // Tapis baris kosong & Susun data ikut turutan 'Place' (1st, 2nd, 3rd...)
    const filteredData = rawData
      .filter(item => (item.luckyNo ?? "").toString().trim() !== "")
      .sort((a, b) => {
        const numA = parseInt((a.place || "").match(/\d+/)?.[0] || 999, 10);
        const numB = parseInt((b.place || "").match(/\d+/)?.[0] || 999, 10);
        return numA - numB;
      });

    // Tukar data kepada String untuk semak jika ada perubahan sebenar di Google Sheets
    const currentDataString = JSON.stringify(filteredData);
    
    // Jika data sama dengan sebelum ini, jangan render semula (Elak skrin berkelip/lag)
    if (currentDataString === lastDataString) return;
    
    // Jika ada data baharu, kemas kini cache dan paparan
    allData = filteredData;
    lastDataString = currentDataString;

    // Laraskan halaman jika data berkurangan
    const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
    if (currentPage > totalPages && totalPages > 0) {
      currentPage = totalPages;
    }

    renderPage(currentPage);
    renderPagination();

  } catch(error){
    console.error("Fetch Error:", error);
  }
}

/* 2. PAPARKAN HALAMAN (Sangat Laju Menggunakan `.map`) */
function renderPage(page){
  const tbody = document.getElementById("winnerTable");
  if (!tbody) return;

  const start = (page - 1) * ROWS_PER_PAGE;
  const end = start + ROWS_PER_PAGE;
  const pageData = allData.slice(start, end);

  // Guna join() untuk kemas kini DOM sekali gus sahaja
  tbody.innerHTML = pageData.map(item => `
    <tr>
      <td>
        <div class="place-badge">
          ${item.place || ""}
        </div>
      </td>
      <td>${item.luckyNo || ""}</td>
      <td>${item.winner || ""}</td>
      <td>${item.company || ""}</td>
      <td>${item.prize || ""}</td>
    </tr>
  `).join("");
}


/* 3. PAPARKAN PAGINATION BUTTON */
function renderPagination(){
  const paginationContainer = document.getElementById("pagination");
  if (!paginationContainer) return;

  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
  if (totalPages <= 1) {
    paginationContainer.innerHTML = "";
    return;
  }

  // Tambah butang Previous (Sekarang berfungsi sebagai First Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman 1
  let html = `<button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>First Page</button>`;

  let startPage = currentPage - 1;
  let endPage = currentPage + 1;

  if(startPage < 1){
    startPage = 1;
    endPage = Math.min(3, totalPages);
  }

  if(endPage > totalPages){
    endPage = totalPages;
    startPage = Math.max(1, totalPages - 2);
  }

  for(let i = startPage; i <= endPage; i++){
    html += `
      <button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
        ${i}
      </button>
    `;
  }

  // Tambah butang Next (Sekarang berfungsi sebagai Last Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman terakhir
  html += `<button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Last Page</button>`;
  paginationContainer.innerHTML = html;
}

function goToPage(page){
  currentPage = page;
  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Next melompat terus ke Halaman Terakhir
function nextPage(){
  if (allData.length === 0) return;
  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

  currentPage = totalPages; // Set terus ke halaman maksimum

  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Previous melompat terus ke Halaman Pertama
function prevPage(){
  if (allData.length === 0) return;

  currentPage = 1; // Set terus ke halaman 1

  renderPage(currentPage);
  renderPagination();
}


/* 4. KAWALAN AUTOMATIK SLIDE */
function pauseSlide(){
  clearInterval(autoSlide);
}

function playSlide(){
  clearInterval(autoSlide);
  autoSlide = setInterval(nextPage, 10000);
}

// Mulakan sistem
loadData().then(() => {
  // Hanya mulakan auto-slide selepas data pertama berjaya dimuat turun
  playSlide();
});

// Semak data baharu setiap 3 saat di latar belakang tanpa mengganggu grafik
setInterval(loadData, 3000);

/* FUNCTION UTK FULLSCREEN PENUH, SALIN DATA & AUTO-RESCALE DI SKRIN 2 */
async function openProjectorMode() {
  if (!('getScreenDetails' in window)) {
    alert("Browser anda tidak menyokong pengesanan skrin kedua secara automatik. Sila gunakan Google Chrome atau Microsoft Edge terkini.");
    return;
  }

  try {
    const screenDetails = await window.getScreenDetails();
    const secondaryScreen = screenDetails.screens.find(screen => !screen.isPrimary);

    if (!secondaryScreen) {
      alert("Skrin kedua (projektor) tidak dikesan! Pastikan kabel disambung dan tetapan Windows diletakkan pada mod 'Extend'.");
      return;
    }

    const windowFeatures = `
      left=${secondaryScreen.availLeft},
      top=${secondaryScreen.availTop},
      width=${secondaryScreen.availWidth},
      height=${secondaryScreen.availHeight},
      menubar=no,toolbar=no,location=no,status=no
    `.replace(/\s+/g, '');

    const projectorWindow = window.open(window.location.href, '_blank', windowFeatures);

    if (projectorWindow) {
      projectorWindow.addEventListener('load', () => {
        const docElem = projectorWindow.document.documentElement;
        const bodyElem = projectorWindow.document.body;
        
        // ----------------=======================================----------------
        // SOLUSI DATA HILANG: Salin pemboleh ubah & fungsi dari skrin utama ke skrin 2
        // ----------------=======================================----------------
        projectorWindow.allData = [...allData]; // Salin data semasa
        projectorWindow.ROWS_PER_PAGE = ROWS_PER_PAGE;
        projectorWindow.currentPage = currentPage;

        // Salin fungsi penting supaya skrin kedua boleh render jadual sendiri
        if (typeof renderPage === 'function') projectorWindow.renderPage = renderPage;
        if (typeof renderTable === 'function') projectorWindow.renderTable = renderTable;
        if (typeof renderPagination === 'function') projectorWindow.renderPagination = renderPagination;

        // Jalankan fungsi paparan jadual pertama kali di skrin kedua
        if (typeof projectorWindow.renderPage === 'function') {
          projectorWindow.renderPage(projectorWindow.currentPage);
        } else if (typeof projectorWindow.renderTable === 'function') {
          projectorWindow.renderTable();
        }
        if (typeof projectorWindow.renderPagination === 'function') {
          projectorWindow.renderPagination();
        }

        // 1. AKTIFKAN FULLSCREEN PENUH (Sama kesan seperti menekan butang F11)
        if (docElem.requestFullscreen) {
          docElem.requestFullscreen({ screen: secondaryScreen }).catch(err => {
            console.error("Gagal melancarkan paparan fullscreen penuh:", err);
          });
        }

        // 2. SUNTIK KELAS CSS UNTUK PROJEKTOR
        docElem.classList.add('projector-view');
        bodyElem.classList.add('projector-view');

        // 3. LOGIK RESPONSIVE AUTO-RESCALE (1536x768)
        const applyScale = () => {
          const widthScale = projectorWindow.innerWidth / 1536;
          const heightScale = projectorWindow.innerHeight / 768;
          bodyElem.style.transform = `scale(${widthScale}, ${heightScale})`;
        };

        applyScale();
        projectorWindow.addEventListener('resize', applyScale);
      });
    }

  } catch (err) {
    console.error("Ralat akses pengurusan skrin:", err);
    alert("Sila benarkan izin (Permission) akses maklumat skrin apabila diminta oleh browser.");
  }
}
