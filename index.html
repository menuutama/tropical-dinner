<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tropical Dinner 2026 - Live Lucky Draw</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  color:white;
  overflow-x:hidden;

  background:
  linear-gradient(rgba(0,0,20,0.82), rgba(0,0,20,0.82)),
  url('https://i.ibb.co/5x6qDRfX/BG.png');

  background-position:center;
  background-repeat:no-repeat;
  background-size:cover;
  background-attachment:fixed;
}

.overlay{
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
  radial-gradient(circle at top left, rgba(0,170,255,0.18), transparent 25%),
  radial-gradient(circle at bottom right, rgba(0,120,255,0.18), transparent 25%);
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:2;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.sub-title{
  font-size:20px;
  letter-spacing:6px;
  color:#ff4a4a;
  font-weight:600;
  text-shadow:0 0 20px rgba(255,0,0,0.5);
}

.title{
  font-size:58px;
  font-weight:700;
  margin-top:10px;
  text-shadow:0 0 25px rgba(0,170,255,0.5);
}

.live-box{
  margin-top:15px;

  display:inline-flex;
  align-items:center;
  gap:10px;

  padding:10px 22px;

  border-radius:999px;

  background:rgba(0,150,255,0.15);
  border:1px solid rgba(0,180,255,0.3);

  backdrop-filter:blur(10px);
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff88;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.5); opacity:0.5;}
  100%{transform:scale(1);}
}

.table-wrapper{
  width:100%;

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:24px;

  overflow:hidden;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 30px rgba(0,150,255,0.12),
  inset 0 0 20px rgba(255,255,255,0.02);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:linear-gradient(90deg,#0066ff,#00bfff);
}

thead th{
  padding:18px 14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  color:white;
}

tbody tr{
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:0.3s;
}

tbody tr:hover{
  background:rgba(255,255,255,0.04);
}

tbody td{
  padding:16px 12px;
  font-size:14px;
  text-align:center;
  color:#ecf7ff;
}

.place-badge{
  width:42px;
  height:42px;

  margin:auto;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  background:linear-gradient(135deg,#008cff,#00d4ff);

  font-weight:700;

  box-shadow:0 0 15px rgba(0,180,255,0.5);
}

.footer{
  margin-top:20px;
}

.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.pagination button,
.control-buttons button{

  min-width:90px;
  height:45px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;

  font-size:14px;
  font-weight:500;

  transition:0.3s;

  backdrop-filter:blur(8px);

  border:1px solid rgba(255,255,255,0.08);
}

.pagination button:hover,
.control-buttons button:hover{
  background:#009dff;
  transform:translateY(-2px);
}

.pagination button.active{
  background:linear-gradient(135deg,#008cff,#00d4ff);
  box-shadow:0 0 15px rgba(0,180,255,0.5);
}

.pagination button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.control-buttons{
  margin-top:15px;

  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.notice{
  margin-top:25px;
  margin-bottom:20px;

  text-align:center;

  font-size:16px;
  color:#cfeeff;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .container{
    padding:10px;
  }

  .sub-title{
    font-size:12px;
    letter-spacing:3px;
  }

  .title{
    font-size:28px;
  }

  thead th{
    font-size:10px;
    padding:10px 6px;
  }

  tbody td{
    font-size:10px;
    padding:10px 5px;
  }

  .place-badge{
    width:28px;
    height:28px;
    font-size:10px;
  }

  .pagination button,
  .control-buttons button{
    min-width:70px;
    height:38px;
    font-size:11px;
  }

  .notice{
    font-size:12px;
  }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">

    <div class="sub-title">
      TROPICAL DINNER 2026
    </div>

    <div class="title">
      LIVE LUCKY DRAW WINNERS
    </div>

    <div class="live-box">
      <div class="dot"></div>
      LIVE UPDATING
    </div>

  </div>

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>PLACE</th>
          <th>LUCKY NO.</th>
          <th>WINNER</th>
          <th>COMPANY</th>
          <th>PRIZE</th>
        </tr>
      </thead>

      <tbody id="winnerTable"></tbody>

    </table>

  </div>

  <div class="footer">

    <div class="pagination" id="pagination"></div>

    <div class="control-buttons">
      <button onclick="playSlide()">▶ Play</button>
      <button onclick="pauseSlide()">⏸ Pause</button>
      <button onclick="openProjectorMode()">🖥️ Projector</button>
    </div>

  </div>

  <div class="notice">
    Kindly collect your lucky draw prize at the registration counter before leaving the event.
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwyHlDqGumNenEhW6w5iAcA2984E1AbnXOfemzaxPOgk8pqXKD-pg6zw4Rw6U3sk-tY/exec";

const ROWS_PER_PAGE = 10;

let allData = [];
let currentPage = 1;
let autoSlide = null;
let lastDataHash = "";

/* =========================
   LOAD DATA
========================= */

async function loadData(){

  try{

    const response = await fetch(API_URL);

    if(!response.ok){
      throw new Error("API Error");
    }

    const rawData = await response.json();

    const filteredData = rawData
    .filter(item => {
      return (item.luckyNo || "").toString().trim() !== "";
    })
    .sort((a,b) => {

      const numA = parseInt(
        (a.place || "").match(/\d+/)?.[0] || 999
      );

      const numB = parseInt(
        (b.place || "").match(/\d+/)?.[0] || 999
      );

      return numA - numB;

    });

    const newHash = JSON.stringify(filteredData);

    /* Elak rerender kalau data sama */
    if(newHash === lastDataHash){
      return;
    }

    lastDataHash = newHash;

    allData = filteredData;

    const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

    if(currentPage > totalPages){
      currentPage = totalPages || 1;
    }

    renderPage();
    renderPagination();

  }
  catch(error){
    console.error("Fetch Error:", error);
  }

}

/* =========================
   RENDER TABLE
========================= */

function renderPage(){

  const tbody = document.getElementById("winnerTable");

  const start = (currentPage - 1) * ROWS_PER_PAGE;

  const pageData = allData.slice(
    start,
    start + ROWS_PER_PAGE
  );

  tbody.innerHTML = pageData.map(item => `
  
    <tr>

      <td>
        <div class="place-badge">
          ${item.place || ""}
        </div>
      </td>

      <td>${item.luckyNo || ""}</td>

      <td>${item.winner || ""}</td>

      <td>${item.company || ""}</td>

      <td>${item.prize || ""}</td>

    </tr>

  `).join("");

}

/* =========================
   PAGINATION
========================= */

function renderPagination(){

  const pagination = document.getElementById("pagination");

  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

  if(totalPages <= 1){
    pagination.innerHTML = "";
    return;
  }

  let html = "";

  html += `
    <button
      onclick="firstPage()"
      ${currentPage === 1 ? "disabled" : ""}
    >
      First
    </button>
  `;

  let startPage = Math.max(currentPage - 1, 1);

  let endPage = Math.min(startPage + 2, totalPages);

  if(endPage - startPage < 2){
    startPage = Math.max(endPage - 2, 1);
  }

  for(let i = startPage; i <= endPage; i++){

    html += `
      <button
        class="${i === currentPage ? "active" : ""}"
        onclick="goToPage(${i})"
      >
        ${i}
      </button>
    `;

  }

  html += `
    <button
      onclick="lastPage()"
      ${currentPage === totalPages ? "disabled" : ""}
    >
      Last
    </button>
  `;

  pagination.innerHTML = html;

}

function goToPage(page){

  currentPage = page;

  renderPage();
  renderPagination();

}

function firstPage(){

  currentPage = 1;

  renderPage();
  renderPagination();

}

function lastPage(){

  currentPage = Math.ceil(allData.length / ROWS_PER_PAGE);

  renderPage();
  renderPagination();

}

/* =========================
   AUTO SLIDE
========================= */

function nextAutoPage(){

  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

  if(totalPages <= 1){
    return;
  }

  currentPage++;

  if(currentPage > totalPages){
    currentPage = 1;
  }

  renderPage();
  renderPagination();

}

function playSlide(){

  pauseSlide();

  autoSlide = setInterval(() => {
    nextAutoPage();
  }, 10000);

}

function pauseSlide(){

  if(autoSlide){
    clearInterval(autoSlide);
  }

}

/* =========================
   PROJECTOR MODE
========================= */

function openProjectorMode(){

  const projectorWindow = window.open(
    "",
    "_blank",
    "width=1536,height=768"
  );

  if(!projectorWindow){
    alert("Please allow pop-up for projector mode.");
    return;
  }

  const htmlContent = document.documentElement.outerHTML;

  projectorWindow.document.open();
  projectorWindow.document.write(htmlContent);
  projectorWindow.document.close();

  projectorWindow.onload = () => {

    projectorWindow.document.body.style.zoom = "100%";

    if(projectorWindow.document.documentElement.requestFullscreen){
      projectorWindow.document.documentElement.requestFullscreen();
    }

  };

}

/* =========================
   START
========================= */

loadData();

playSlide();

/* Refresh data background */
setInterval(loadData, 3000);

</script>

</body>
</html>
