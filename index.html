<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">
    <div class="sub-title">TROPICAL DINNER 2026</div>
    <div class="title">LIVE LUCKY DRAW WINNERS</div>

      LIVE UPDATING
    </div>
  </div>

  <div class="main-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>PLACE</th>
            <th>LUCKY NO.</th>
            <th>WINNER</th>
            <th>COMPANY</th>
            <th>PRIZE</th>
          </tr>
        </thead>
        <tbody id="winnerTable"></tbody>
      </table>
    </div>

    <div class="footer">
      <div class="page-number" id="pageNumber">
        <div class="pagination-wrapper">
          <div class="pagination" id="pagination"></div>
          <div class="control-buttons">
            <button onclick="playSlide()">▶ Play</button>
            <button onclick="pauseSlide()">⏸ Pause</button>
            <button id="projectorBtn" onclick="openProjectorMode()">🖥️ Buka Skrin Projektor</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="notice">
    **Kindly collect your lucky draw prize at the registration counter before leaving the event.
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwyHlDqGumNenEhW6w5iAcA2984E1AbnXOfemzaxPOgk8pqXKD-pg6zw4Rw6U3sk-tY/exec";

let allData = [];
let currentPage = 1;
let lastDataString = ""; // Menyimpan cache data untuk elak render berulang
let autoSlide;
const ROWS_PER_PAGE = 10;

/* 1. MUAT TURUN DATA (Lebih Pintar & Tiada Buffering Grafik) */
async function loadData(){
  try{
    const response = await fetch(API_URL);
    const rawData = await response.json();

    // Tapis baris kosong & Susun data ikut turutan 'Place' (1st, 2nd, 3rd...)
    const filteredData = rawData
      .filter(item => (item.luckyNo ?? "").toString().trim() !== "")
      .sort((a, b) => {
        const numA = parseInt((a.place || "").match(/\d+/)?.[0] || 999, 10);
        const numB = parseInt((b.place || "").match(/\d+/)?.[0] || 999, 10);
        return numA - numB;
      });

    // Tukar data kepada String untuk semak jika ada perubahan sebenar di Google Sheets
    const currentDataString = JSON.stringify(filteredData);
    
    // Jika data sama dengan sebelum ini, jangan render semula (Elak skrin berkelip/lag)
    if (currentDataString === lastDataString) return;
    
    // Jika ada data baharu, kemas kini cache dan paparan
    allData = filteredData;
    lastDataString = currentDataString;

    // Laraskan halaman jika data berkurangan
    const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
    if (currentPage > totalPages && totalPages > 0) {
      currentPage = totalPages;
    }

    renderPage(currentPage);
    renderPagination();

  } catch(error){
    console.error("Fetch Error:", error);
  }
}

/* 2. PAPARKAN HALAMAN (Sangat Laju Menggunakan `.map`) */
function renderPage(page){
  const tbody = document.getElementById("winnerTable");
  if (!tbody) return;

  const start = (page - 1) * ROWS_PER_PAGE;
  const end = start + ROWS_PER_PAGE;
  const pageData = allData.slice(start, end);

  // Guna join() untuk kemas kini DOM sekali gus sahaja
  tbody.innerHTML = pageData.map(item => `
    <tr>
      <td>
        <div class="place-badge">
          ${item.place || ""}
        </div>
      </td>
      <td>${item.luckyNo || ""}</td>
      <td>${item.winner || ""}</td>
      <td>${item.company || ""}</td>
      <td>${item.prize || ""}</td>
    </tr>
  `).join("");
}


/* 3. PAPARKAN PAGINATION BUTTON */
function renderPagination(){
  const paginationContainer = document.getElementById("pagination");
  if (!paginationContainer) return;

  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
  if (totalPages <= 1) {
    paginationContainer.innerHTML = "";
    return;
  }

  // Tambah butang Previous (Sekarang berfungsi sebagai First Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman 1
  let html = `<button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>First Page</button>`;

  let startPage = currentPage - 1;
  let endPage = currentPage + 1;

  if(startPage < 1){
    startPage = 1;
    endPage = Math.min(3, totalPages);
  }

  if(endPage > totalPages){
    endPage = totalPages;
    startPage = Math.max(1, totalPages - 2);
  }

  for(let i = startPage; i <= endPage; i++){
    html += `
      <button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
        ${i}
      </button>
    `;
  }

  // Tambah butang Next (Sekarang berfungsi sebagai Last Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman terakhir
  html += `<button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Last Page</button>`;
  paginationContainer.innerHTML = html;
}

function goToPage(page){
  currentPage = page;
  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Next melompat terus ke Halaman Terakhir
function nextPage(){
  if (allData.length === 0) return;
  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

  currentPage = totalPages; // Set terus ke halaman maksimum

  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Previous melompat terus ke Halaman Pertama
function prevPage(){
  if (allData.length === 0) return;

  currentPage = 1; // Set terus ke halaman 1

  renderPage(currentPage);
  renderPagination();
}


/* 4. KAWALAN AUTOMATIK SLIDE */
function pauseSlide(){
  clearInterval(autoSlide);
}

function playSlide(){
  clearInterval(autoSlide);
  autoSlide = setInterval(nextPage, 10000);
}

// Mulakan sistem
loadData().then(() => {
  // Hanya mulakan auto-slide selepas data pertama berjaya dimuat turun
  playSlide();
});

// Semak data baharu setiap 3 saat di latar belakang tanpa mengganggu grafik
setInterval(loadData, 3000);

  /* FUNCTION UTK FIX DAN LOCK PAPARAN DI SKRIN 2 (TIADA SCROLL) */
async function openProjectorMode() {
  if (!('getScreenDetails' in window)) {
    alert("Browser anda tidak menyokong pengesanan skrin kedua secara automatik. Sila gunakan Google Chrome atau Microsoft Edge.");
    return;
  }

  try {
    const screenDetails = await window.getScreenDetails();
    const secondaryScreen = screenDetails.screens.find(screen => !screen.isPrimary);

    if (!secondaryScreen) {
      alert("Skrin kedua (projektor) tidak dikesan! Pastikan kabel disambung dan set mod 'Extend'.");
      return;
    }

    // Koordinat skrin kedua
    const windowFeatures = `
      left=${secondaryScreen.availLeft},
      top=${secondaryScreen.availTop},
      width=${secondaryScreen.availWidth},
      height=${secondaryScreen.availHeight},
      menubar=no,toolbar=no,location=no,status=no
    `.replace(/\s+/g, '');

    const projectorWindow = window.open(window.location.href, '_blank', windowFeatures);

    if (projectorWindow) {
      projectorWindow.addEventListener('load', () => {
        const docElem = projectorWindow.document.documentElement;
        
        // 1. MASUK MOD FULLSCREEN
        if (docElem.requestFullscreen) {
          docElem.requestFullscreen({ screen: secondaryScreen }).catch(err => {
            console.error("Gagal fullscreen automatik:", err);
          });
        }

        // 2. SUNTIK GAYA CSS KHAS (FIXED JALUR - NO SCROLL)
        const style = projectorWindow.document.createElement('style');
        style.innerHTML = `
          /* Paksa body isi ruang 1536x768 dengan tepat dan buang scrollbar */
          html, body {
            width: 1536px !important;
            height: 768px !important;
            max-width: 1536px !important;
            max-height: 768px !important;
            overflow: hidden !important; /* Kunci terus dari keluar scrollbar */
            margin: 0 !important;
            padding: 20px !important;
/* STRATEGI BARU: HANTAR HTML JADUAL KE SKRIN PROJEKTOR */
function openProjectorMode() {
  // Ambil data resolusi skrin semasa (untuk mengira kedudukan skrin kedua)
  const screenWidth = window.screen.width;
  
  // Membuka tetingkap kosong tepat di koordinat Skrin Kedua (Projektor)
  // Menghilangkan segala search bar dan bingkai browser sedia ada
  const windowFeatures = `
    left=${screenWidth},
    top=0,
    width=1536,
    height=768,
    menubar=no,toolbar=no,location=no,status=no
  `.replace(/\s+/g, '');

  const projectorWindow = window.open("", "_blank", windowFeatures);

  if (projectorWindow) {
    // Ambil kod CSS sedia ada daripada skrin utama
    const originalStyles = Array.from(document.querySelectorAll('style, link[rel="stylesheet"]'))
      .map(style => style.outerHTML)
      .join('\n');

    // Ambil struktur HTML jadual dan pagination dari skrin utama
    // (Pastikan ID kontena jadual/pagination anda selari dengan kod di bawah)
    const tableHTML = document.querySelector("table") ? document.querySelector("table").outerHTML : "";
    const paginationHTML = document.getElementById("pagination") ? document.getElementById("pagination").outerHTML : "";

    // Suntik kandungan lengkap terus ke dalam dokumen skrin projektor
    projectorWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>Live Lucky Draw - Projector Screen</title>
        ${originalStyles}
      </head>
      <body class="projector-view">
        <!-- Kotak Kecemasan untuk Aktifkan Skrin Penuh (Meniru F11) -->
        <div id="fsAlert" onclick="this.style.display='none'; document.documentElement.requestFullscreen();" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(12,16,32,0.95); color:#00bfff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:99999; cursor:pointer; font-family:sans-serif; text-align:center; padding:20px; box-sizing:border-box;">
          <span style="font-size:80px; margin-bottom:20px;">🖥️</span>
          <h2 style="margin:0 0 10px 0; font-size:32px;">Klik Di Sini Untuk Mod Projektor</h2>
          <p style="margin:0; font-size:18px; color:#a0a5b5;">Sistem akan automatik masuk Full Screen (Kesan F11)</p>
        </div>

        <!-- Kandungan Utama Jadual & Pagination -->
        <div class="projector-container">
          ${tableHTML}
          ${paginationHTML}
        </div>

        <script>
          // Logik Responsive Auto-Rescale (Kunci Nisbah 1536x768)
          function doScale() {
            const container = document.querySelector('.projector-container');
            if(container) {
              const widthScale = window.innerWidth / 1536;
              const heightScale = window.innerHeight / 768;
              container.style.transform = "scale(" + widthScale + "," + heightScale + ")";
            }
          }
          window.addEventListener('resize', doScale);
          window.addEventListener('load', doScale);

    projectorWindow.document.close();
  } else {

  }

</script>
