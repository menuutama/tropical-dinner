<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tropical Dinner 2026 - Live Lucky Draw</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

   width:100%;
   //margin:auto;


   margin:0;
  // padding:30;
   //width:100%;
   min-height:100vh;

  color:white;
  overflow:scroll;

  background:
  linear-gradient(rgba(0,0,20,0.82), rgba(0,0,20,0.82)),
  url('https://i.ibb.co/5x6qDRfX/BG.png');
    background-position:center;
    background-repeat:no-repeat;
    background-size:100% 250%; 
    background-attachment:fixed;
 }

.overlay{
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left, rgba(0,170,255,0.25), transparent 25%),
  radial-gradient(circle at bottom right, rgba(0,120,255,0.25), transparent 25%);
  pointer-events:none;
}

.container{
   width:100%;
   max-width:1200px;
   margin:auto;
   padding:5px;
   box-sizing:border-box;


  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.sub-title{
  font-size:20px;
  letter-spacing:6px;
  color:#ff3b3b;
  font-weight:600;
  text-shadow:0 0 20px rgba(255,0,0,0.5);

}

.title{
  font-size:60px;
  font-weight:700;
  color:white;
  margin-top:10px;
  text-shadow:0 0 25px rgba(0,170,255,0.5);
}

.live-box{
  margin-top:15px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 20px;
  border-radius:999px;

  background:rgba(0,150,255,0.15);
  border:1px solid rgba(0,180,255,0.3);

  backdrop-filter:blur(10px);
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff88;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.5);opacity:0.5;}
  100%{transform:scale(1);opacity:1;}
}

.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  //overflow:hidden;
}

.table-wrapper{
  flex:1;
  font-size:60px;
  text-transform: uppercase;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);

  border-radius:25px;
  overflow:hidden;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 30px rgba(0,150,255,0.15),
  inset 0 0 20px rgba(255,255,255,0.03);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:linear-gradient(90deg,#0066ff,#00bfff);
}

thead th{
  padding:20px;
  text-align:left;
  font-size:16px;
  font-weight:600;
  color:white;
}

tbody tr{
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

tbody tr:hover{
  background:rgba(255,255,255,0.05);
}

tbody td{
  padding:18px 20px;
  font-size:15px;
  color:#ecf7ff;
}

.place-badge{
  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  background:linear-gradient(135deg,#008cff,#00d4ff);

  font-weight:700;

  box-shadow:0 0 15px rgba(0,180,255,0.5);
}

.footer{
  margin-top:1px;
  margin-bottom:30px;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;

  color:#c7eaff;
}

.page-number{
  font-size:14px;
  font-weight:600;
}

.notice{
  margin-bottom:50px;
  font-size:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

@media(max-width:768px){

  .title{
    font-size:34px;
  }

  thead th{
    font-size:12px;
    padding:12px;
  }

  tbody td{
    font-size:11px;
    padding:12px;
  }

  .place-badge{
    width:32px;
    height:32px;
    font-size:12px;
  }

}

.pagination{
  margin-top:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.pagination button{

  min-width:45px;
  height:45px;
  padding:5px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;

  font-weight:300;
  font-size:12px;

  transition:0.7s;

  backdrop-filter:blur(8px);

  border:1px solid rgba(255,255,255,0.08);

}

.control-buttons{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.control-buttons button{

  min-width:90px;
  height:45px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;

  font-size:14px;
  font-weight:500;

  transition:0.3s;

  backdrop-filter:blur(8px);

  border:1px solid rgba(255,255,255,0.08);
}

.control-buttons button:hover{
  background:#009dff;
}

.pagination button:hover{
  background:#009dff;
  transform:translateY(-2px);
}

.pagination button.active{
  background:linear-gradient(135deg,#008cff,#00d4ff);
  box-shadow:0 0 15px rgba(0,180,255,0.5);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">
    <div class="sub-title">TROPICAL DINNER 2026</div>
    <div class="title">LIVE LUCKY DRAW WINNERS</div>
    <div class="live-box">
      <div class="dot"></div>
      LIVE UPDATING
    </div>
  </div>

  <div class="main-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>PLACE</th>
            <th>LUCKY NO.</th>
            <th>WINNER</th>
            <th>COMPANY</th>
            <th>PRIZE</th>
          </tr>
        </thead>
        <tbody id="winnerTable"></tbody>
      </table>
    </div>

    <div class="footer">
      <div class="page-number" id="pageNumber">
        <div class="pagination-wrapper">
          <div class="pagination" id="pagination"></div>
          <div class="control-buttons">
            <button onclick="playSlide()">▶ Play</button>
            <button onclick="pauseSlide()">⏸ Pause</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="notice">
    **Kindly collect your lucky draw prize at the registration counter before leaving the event.
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwyHlDqGumNenEhW6w5iAcA2984E1AbnXOfemzaxPOgk8pqXKD-pg6zw4Rw6U3sk-tY/exec";

let allData = [];
let currentPage = 1;
let lastDataString = ""; // Menyimpan cache data untuk elak render berulang
let autoSlide;
const ROWS_PER_PAGE = 10;

/* 1. MUAT TURUN DATA (Lebih Pintar & Tiada Buffering Grafik) */
async function loadData(){
  try{
    const response = await fetch(API_URL);
    const rawData = await response.json();

    // Tapis baris kosong & Susun data ikut turutan 'Place' (1st, 2nd, 3rd...)
    const filteredData = rawData
      .filter(item => (item.luckyNo ?? "").toString().trim() !== "")
      .sort((a, b) => {
        const numA = parseInt((a.place || "").match(/\d+/)?.[0] || 999, 10);
        const numB = parseInt((b.place || "").match(/\d+/)?.[0] || 999, 10);
        return numA - numB;
      });

    // Tukar data kepada String untuk semak jika ada perubahan sebenar di Google Sheets
    const currentDataString = JSON.stringify(filteredData);
    
    // Jika data sama dengan sebelum ini, jangan render semula (Elak skrin berkelip/lag)
    if (currentDataString === lastDataString) return;
    
    // Jika ada data baharu, kemas kini cache dan paparan
    allData = filteredData;
    lastDataString = currentDataString;

    // Laraskan halaman jika data berkurangan
    const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
    if (currentPage > totalPages && totalPages > 0) {
      currentPage = totalPages;
    }

    renderPage(currentPage);
    renderPagination();

  } catch(error){
    console.error("Fetch Error:", error);
  }
}

/* 2. PAPARKAN HALAMAN (Sangat Laju Menggunakan `.map`) */
function renderPage(page){
  const tbody = document.getElementById("winnerTable");
  if (!tbody) return;

  const start = (page - 1) * ROWS_PER_PAGE;
  const end = start + ROWS_PER_PAGE;
  const pageData = allData.slice(start, end);

  // Guna join() untuk kemas kini DOM sekali gus sahaja
  tbody.innerHTML = pageData.map(item => `
    <tr>
      <td>
        <div class="place-badge">
          ${item.place || ""}
        </div>
      </td>
      <td>${item.luckyNo || ""}</td>
      <td>${item.winner || ""}</td>
      <td>${item.company || ""}</td>
      <td>${item.prize || ""}</td>
    </tr>
  `).join("");
}


/* 3. PAPARKAN PAGINATION BUTTON */
function renderPagination(){
  const paginationContainer = document.getElementById("pagination");
  if (!paginationContainer) return;

  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);
  if (totalPages <= 1) {
    paginationContainer.innerHTML = "";
    return;
  }

  // Tambah butang Previous (Sekarang berfungsi sebagai First Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman 1
  let html = `<button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>First Page</button>`;

  let startPage = currentPage - 1;
  let endPage = currentPage + 1;

  if(startPage < 1){
    startPage = 1;
    endPage = Math.min(3, totalPages);
  }

  if(endPage > totalPages){
    endPage = totalPages;
    startPage = Math.max(1, totalPages - 2);
  }

  for(let i = startPage; i <= endPage; i++){
    html += `
      <button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
        ${i}
      </button>
    `;
  }

  // Tambah butang Next (Sekarang berfungsi sebagai Last Page)
  // Butang akan disekat (disabled) jika pengguna sudah berada di halaman terakhir
  html += `<button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Last Page</button>`;
  paginationContainer.innerHTML = html;
}

function goToPage(page){
  currentPage = page;
  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Next melompat terus ke Halaman Terakhir
function nextPage(){
  if (allData.length === 0) return;
  const totalPages = Math.ceil(allData.length / ROWS_PER_PAGE);

  currentPage = totalPages; // Set terus ke halaman maksimum

  renderPage(currentPage);
  renderPagination();
}

// TUKAR: Logik butang Previous melompat terus ke Halaman Pertama
function prevPage(){
  if (allData.length === 0) return;

  currentPage = 1; // Set terus ke halaman 1

  renderPage(currentPage);
  renderPagination();
}


/* 4. KAWALAN AUTOMATIK SLIDE */
function pauseSlide(){
  clearInterval(autoSlide);
}

function playSlide(){
  clearInterval(autoSlide);
  autoSlide = setInterval(nextPage, 10000);
}

// Mulakan sistem
loadData().then(() => {
  // Hanya mulakan auto-slide selepas data pertama berjaya dimuat turun
  playSlide();
});

// Semak data baharu setiap 3 saat di latar belakang tanpa mengganggu grafik
setInterval(loadData, 3000);
</script>

</body>

</html>
