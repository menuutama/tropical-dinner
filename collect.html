<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Draw Prize Collection System</title>

<link rel="stylesheet" href="style2.css">
</head>

<body>

<header class="hero-header">
  <h1>TROPICAL DINNER 2026</h1>
  <h2>Lucky Draw Prize Collection System</h2>
</header>

<div class="container">

  <div class="input-box collect-search-box">
    <div class="input-container">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search Lucky No / Employee / Company"
        autocomplete="off"
      >
      <button class="clear-btn" id="clearSearchBtn">X</button>
    </div>
  </div>

  <div class="main-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Place</th>
            <th>Lucky No.</th>
            <th>Employee Name</th>
            <th>Company Name</th>
            <th>Prize</th>
          </tr>
        </thead>

        <tbody id="collectTableBody">
          <tr>
            <td colspan="5">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- =====================================
     COLLECT POPUP
===================================== -->

<div id="collectPopup" class="winner-modal">

  <div class="winner-modal-box collect-modal-box">

    <button
      class="modal-close"
      id="closePopupBtn">
      ×
    </button>

    <div
      class="modal-place"
      id="popupPlace">
    </div>

    <div
      class="modal-winner"
      id="popupEmployee">
    </div>

    <div
      class="modal-info">
      Lucky No :
      <span id="popupLuckyNo"></span>
    </div>

    <div
      class="modal-info">
      Company :
      <span id="popupCompany"></span>
    </div>

    <img
      id="popupImage"
      class="modal-image"
      src=""
      alt="Prize Image"
    >

    <div
      class="modal-prize"
      id="popupPrize">
    </div>

    <div class="modal-note">
      **Image for display purposes only.<br>
      (Gambar untuk tujuan paparan sahaja)
    </div>

    <!-- CAMERA / PHOTO COLLECTION -->
    <div id="collectionPhotoBox" class="collection-photo-box">

      <label for="collectionPhotoInput" class="photo-upload-btn" id="photoUploadLabel">
        📷 Take Winner Photo
      </label>

      <input
        type="file"
        id="collectionPhotoInput"
        accept="image/*"
        capture="environment"
      >

      <img
        id="collectionPhotoPreview"
        class="collection-photo-preview"
        src=""
        alt="Winner Collection Photo"
      >

      <div id="photoStatusText" class="photo-status-text">
        Please take photo before collect.
      </div>

    </div>

    <button
      class="attend-btn collect-action-btn"
      id="collectBtn">
      Collect
    </button>

  </div>

</div>
<script src="collect.js"></script>

</body>
</html>
